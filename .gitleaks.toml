# gitleaks configuration — https://github.com/gitleaks/gitleaks
# Run manually: gitleaks detect --source . --redact
# Installed as a pre-commit hook via lefthook (see .lefthook.yml).

title = "SmartTrail gitleaks config"

[extend]
# Use the default ruleset as a base, then add project-specific rules below.
useDefault = true

[[rules]]
id = "prisma-database-url"
description = "Prisma DATABASE_URL with credentials"
regex = '''postgres(?:ql)?://[^:]+:[^@]+@'''
tags = ["database", "credentials"]

[[rules]]
id = "jwt-secret-assignment"
description = "JWT_SECRET assignment in env files"
regex = '''JWT_SECRET\s*=\s*["']?[A-Za-z0-9\+/=\!\@\#\$\%\^\&\*\(\)\[\]\{\}\|\\\:\;\<\>\,\.\?\/\-\_]{16,}'''
tags = ["jwt", "secret"]

[allowlist]
# Ignore example / template env files — they contain placeholder values only.
paths = [
  '''.env\.example''',
  '''\.env\.example''',
]
# Ignore test fixtures that intentionally contain fake keys.
regexes = [
  '''CHANGE_ME''',
  '''YOUR_.*_HERE''',
]
